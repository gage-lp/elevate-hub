<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

<style>
  :root{
    --bg:#070b16;
    --panel:#0b1020;
    --glass:rgba(255,255,255,0.05);
    --glass-border:rgba(255,255,255,0.14);
    --text:#eef2ff;
    --muted:#93a0c4;
    --accent:#6f86ff;
    --accent-2:#c074ff;
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;position:relative}

  /* ---- Nebula (subtle, premium) ---- */
  .nebula{position:fixed;inset:0;z-index:-2;overflow:hidden;background:
    radial-gradient(120% 100% at 50% -10%, #101935 0%, var(--bg) 60%)}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;mix-blend-mode:screen}
  .b1{width:55vw;height:55vw;left:-15vw;top:-20vw;background:radial-gradient(circle,#2f43ff,transparent 70%);animation:drift1 34s ease-in-out infinite}
  .b2{width:45vw;height:45vw;right:-12vw;top:20vh;background:radial-gradient(circle,#a23bff,transparent 70%);animation:drift2 40s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(7vw,5vh)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,7vh)}}

  .hidden{display:none!important}

  /* ====================== LOGIN ====================== */
  .login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:var(--glass);border:1px solid var(--glass-border);
    border-radius:24px;padding:34px 30px;backdrop-filter:blur(18px);box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .login-card .mark{width:46px;height:46px;border-radius:13px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 30px rgba(111,134,255,.6)}
  .login-card h2{text-align:center;font-size:22px;margin-bottom:4px}
  .login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
  input,textarea{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--glass-border);
    color:var(--text);padding:12px 14px;border-radius:12px;font-size:14px;font-family:inherit;margin-bottom:12px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .err{color:#ff8a8a;font-size:13px;min-height:18px;text-align:center;margin-top:4px}
  .btn{border:1px solid var(--glass-border);background:var(--glass);color:var(--text);
    padding:9px 16px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;backdrop-filter:blur(8px)}
  .btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;box-shadow:0 6px 24px rgba(111,134,255,.35)}
  .btn.danger{border-color:rgba(255,90,90,.5);color:#ff8a8a}
  .btn.danger:hover{background:rgba(255,90,90,.12)}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* ====================== APP SHELL ====================== */
  #app{display:flex;height:100vh}

  /* sidebar */
  .sidebar{width:118px;flex:0 0 118px;display:flex;flex-direction:column;align-items:center;
    padding:22px 10px;gap:8px;background:linear-gradient(180deg,rgba(11,16,32,.85),rgba(11,16,32,.55));
    border-right:1px solid rgba(255,255,255,.06);backdrop-filter:blur(14px);z-index:10}
  .sidebar .logo{width:38px;height:38px;border-radius:11px;margin-bottom:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 24px rgba(111,134,255,.55)}
  .nav-item{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:12px 4px;border-radius:14px;cursor:pointer;color:var(--muted);transition:.2s;border:1px solid transparent;background:none}
  .nav-item:hover{color:var(--text);background:var(--glass);border-color:var(--glass-border)}
  .nav-item.active{color:var(--text);background:var(--glass);border-color:rgba(111,134,255,.4)}
  .nav-item svg{width:22px;height:22px}
  .nav-item span{font-size:11px;font-weight:600;letter-spacing:.2px}
  .nav-spacer{flex:1}
  .nav-user{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted)}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2))}

  /* content */
  .content{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px clamp(20px,4vw,44px) 6px}
  .topbar .title h1{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  .topbar .title h2{font-size:26px;font-weight:700;margin-top:2px}
  .topbar .status{font-size:13px;color:var(--muted)}

  .edit-banner{display:none;align-items:center;gap:10px;margin:8px clamp(20px,4vw,44px) 0;
    background:rgba(111,134,255,.12);border:1px solid rgba(111,134,255,.35);
    border-radius:14px;padding:11px 16px;font-size:13px;color:#cdd6ff}
  body.editing .edit-banner{display:flex}

  /* rail */
  .rail-wrap{flex:1;position:relative;display:flex;align-items:center;min-height:0}
  .rail{display:flex;gap:22px;overflow-x:auto;overflow-y:hidden;width:100%;height:100%;
    padding:18px clamp(20px,4vw,44px) 26px;scroll-snap-type:x proximity;scroll-behavior:smooth;align-items:center}
  .rail::-webkit-scrollbar{height:8px}
  .rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px}
  .rail::-webkit-scrollbar-track{background:transparent}

  .card{flex:0 0 auto;width:clamp(240px,24vw,310px);height:min(72vh,500px);
    position:relative;border-radius:20px;overflow:hidden;scroll-snap-align:start;cursor:pointer;
    border:1px solid var(--glass-border);background:#10162c;
    transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s}
  .card:hover{transform:translateY(-8px) scale(1.015);border-color:rgba(111,134,255,.55);
    box-shadow:0 26px 60px rgba(0,0,0,.5),0 0 46px rgba(111,134,255,.2)}
  .card .thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .card .thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;
    background:linear-gradient(135deg,rgba(111,134,255,.25),rgba(192,116,255,.25))}
  .card .scrim{position:absolute;inset:0;background:
    linear-gradient(180deg,rgba(4,7,16,.72) 0%,rgba(4,7,16,.15) 32%,rgba(4,7,16,0) 55%,rgba(4,7,16,.55) 100%)}
  .card .label{position:absolute;top:20px;left:22px;right:22px}
  .card .label .sub{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#aeb9ff;margin-bottom:5px}
  .card .label h3{font-size:23px;font-weight:700;line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .card .cta{position:absolute;left:22px;right:18px;bottom:18px;z-index:2;
    display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card .cta .lbl{font-size:12.5px;font-weight:600;letter-spacing:.3px;color:rgba(255,255,255,.9);
    text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .card .cta .go{flex:0 0 auto;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 6px 22px rgba(111,134,255,.55);transition:transform .25s}
  .card:hover .cta .go{transform:scale(1.14)}
  .card .cta .go svg{width:20px;height:20px}
  .lock-tag{position:absolute;top:16px;right:16px;font-size:11px;font-weight:600;z-index:2;
    background:rgba(4,7,16,.7);border:1px solid var(--glass-border);padding:4px 9px;border-radius:20px;color:#ffd27b;backdrop-filter:blur(6px)}
  .admin-tools{position:absolute;bottom:18px;left:22px;right:22px;display:none;gap:8px;z-index:3}
  body.editing .admin-tools{display:flex}
  body.editing .card{cursor:grab}
  body.editing .card .cta{display:none}
  .card.dragging{opacity:.45}

  /* rail arrows */
  .rail-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:8;width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:rgba(11,16,32,.7);border:1px solid var(--glass-border);color:var(--text);backdrop-filter:blur(8px);transition:.2s}
  .rail-arrow:hover{background:var(--accent);border-color:var(--accent)}
  .rail-arrow.left{left:8px}.rail-arrow.right{right:8px}
  .rail-arrow svg{width:20px;height:20px}
  @media(hover:none){.rail-arrow{display:none}}

  .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);width:100%}

  /* ====================== EXPANDED DETAIL ====================== */
  .detail-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    padding:24px;background:rgba(3,5,12,.78);backdrop-filter:blur(12px)}
  .detail-overlay.show{display:flex}
  .detail{position:relative;width:min(860px,95vw);height:min(520px,86vh);
    border-radius:24px;overflow:hidden;background:var(--panel);border:1px solid var(--glass-border);
    display:flex;box-shadow:0 40px 100px rgba(0,0,0,.6);animation:pop .34s cubic-bezier(.2,.9,.25,1)}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .detail .media{position:relative;flex:0 0 42%;min-width:0;background:#0c1124}
  .detail .media #d_hero{position:absolute;inset:0}
  .detail .media img{width:100%;height:100%;object-fit:cover;display:block}
  .detail .media .empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:13px;background:linear-gradient(135deg,rgba(111,134,255,.3),rgba(192,116,255,.3))}
  .detail .media::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,rgba(11,16,32,0) 72%,rgba(11,16,32,.55) 100%)}
  .detail .info{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;padding:32px clamp(24px,3vw,36px)}
  .detail .info .scroll{flex:1 1 auto;min-height:0;overflow-y:auto}
  .detail .info .sub{font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .detail .info h2{font-size:28px;font-weight:800;line-height:1.12;margin-bottom:16px}
  .detail .info p{font-size:15px;line-height:1.7;color:#c4cdec;white-space:pre-wrap}
  .detail .info .foot{flex:0 0 auto;padding-top:20px}
  .detail .info .open{display:inline-flex;padding:13px 28px;font-size:15px;text-decoration:none}
  .detail .close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;
    background:rgba(4,7,16,.6);border:1px solid var(--glass-border);color:#fff;cursor:pointer;font-size:17px;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);z-index:3}
  .detail .close:hover{background:rgba(255,90,90,.25)}
  @media(max-width:640px){
    .detail{flex-direction:column;height:min(86vh,640px)}
    .detail .media{flex:0 0 190px}
    .detail .media::after{background:linear-gradient(180deg,rgba(11,16,32,0) 60%,rgba(11,16,32,.6) 100%)}
  }

  /* ====================== ADD/EDIT MODAL ====================== */
  .overlay{position:fixed;inset:0;z-index:70;background:rgba(3,5,12,.72);backdrop-filter:blur(6px);
    display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--glass-border);border-radius:22px;padding:28px}
  .modal h2{font-size:20px;margin-bottom:18px}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .toggle{display:flex;align-items:center;gap:10px;margin:6px 0 14px;font-size:14px;cursor:pointer}
  .toggle input{width:auto;margin:0}
  .access-list{max-height:200px;overflow-y:auto;border:1px solid var(--glass-border);border-radius:12px;padding:10px;margin-bottom:14px}
  .access-list label{display:flex;align-items:center;gap:8px;color:var(--text);margin-bottom:8px;cursor:pointer}
  .access-list input{width:auto;margin:0}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .thumb-preview{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin-bottom:12px;display:none}

  @media(max-width:720px){
    .sidebar{width:74px;flex-basis:74px}
    .nav-item span,.nav-user span{display:none}
    .card{width:74vw;height:64vh}
  }
</style>
</head>
<body>
<div class="nebula"><div class="blob b1"></div><div class="blob b2"></div></div>

<!-- LOGIN -->

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="logo"></div>
    <button class="nav-item active" title="Library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Library</span>
    </button>
    <button id="navAdd" class="nav-item hidden" onclick="openModal()" title="Add card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add</span>
    </button>
    <button id="navEdit" class="nav-item hidden" onclick="toggleEdit()" title="Edit mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      <span id="navEditLabel">Edit</span>
    </button>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <div class="avatar" id="avatar"></div>
      <button class="nav-item" onclick="signOut()" title="Sign out" style="padding-top:8px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <div class="content">
    <div class="topbar">
      <div class="title"><h1>Elevate Hub</h1><h2>Resource Library</h2></div>
      <div class="status" id="who"></div>
    </div>
    <div class="edit-banner">✦ Edit mode — drag cards to reorder, or use the buttons on each card.</div>

    <div class="rail-wrap">
      <div class="rail-arrow left" onclick="scrollRail(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
      <div id="rail" class="rail"></div>
      <div class="rail-arrow right" onclick="scrollRail(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      <div id="emptyState" class="empty-state hidden">No resources available yet.</div>

</div>

<!-- EXPANDED DETAIL -->
<div id="detailOverlay" class="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail">
    <div class="media"><div id="d_hero"></div></div>
    <button class="close" onclick="closeDetail()">✕</button>
    <div class="info">
      <div class="scroll">
        <div id="d_sub" class="sub"></div>
        <h2 id="d_title"></h2>
        <p id="d_desc"></p>
      </div>
      <div class="foot"><a id="d_link" class="btn primary open" target="_blank" rel="noopener"></a></div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div id="overlay" class="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add card</h2>
    <input type="hidden" id="cardId">
    <label>Title</label><input id="f_title" placeholder="Elevate Academy">
    <label>Subtitle</label><input id="f_subtitle" placeholder="Training & Certification">
    <label>Description</label><textarea id="f_description" rows="3" placeholder="Shown when the card is expanded"></textarea>
    <div class="row">
      <div><label>Link URL</label><input id="f_link" placeholder="https://..."></div>
      <div><label>Button label</label><input id="f_button" placeholder="Open"></div>
    </div>
    <label>Thumbnail (portrait images look best)</label>
    <img id="thumbPreview" class="thumb-preview">
    <input id="f_thumb" type="file" accept="image/*">
    <label class="toggle"><input type="checkbox" id="f_visall" onchange="toggleAccessList()"> Visible to all agents</label>
    <div id="accessWrap"><label>Or pick who can see it</label><div id="accessList" class="access-list"></div></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="saveBtn" onclick="saveCard()">Save</button>
    </div>
    <div id="modalErr" class="err"></div>
  </div>
</div>

<script>
let sb, me=null, isAdmin=false, agents=[], sortable=null, cardsById={};

function init(){
  if(!window.supabase || SUPABASE_URL.includes('YOUR-PROJECT')){
    document.getElementById('loginErr').textContent='Add your Supabase URL and anon key at the top of the file.';
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{ if(data.session) onLoggedIn(); });
}

async function signIn(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ err.textContent=error.message; return; }
  onLoggedIn();
}
async function signOut(){ await sb.auth.signOut(); location.reload(); }

async function onLoggedIn(){
  const {data:{user}}=await sb.auth.getUser();
  const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  me={...user,...profile};
  isAdmin = profile && profile.role==='admin';
  const name = profile?.full_name || user.email;

  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent = name + (isAdmin?' · Admin':'');
  document.getElementById('avatar').textContent = (name||'?').trim().charAt(0).toUpperCase();

  if(isAdmin){
    document.getElementById('navAdd').classList.remove('hidden');
    document.getElementById('navEdit').classList.remove('hidden');
    const {data}=await sb.from('profiles').select('id,full_name').eq('role','agent').order('full_name');
    agents=data||[];
  }
  loadCards();
}

async function loadCards(){
  const {data:cards,error}=await sb.from('cards').select('*').order('sort_order');
  if(error){ console.error(error); return; }
  cardsById={}; cards.forEach(c=>cardsById[c.id]=c);

  let accessByCard={};
  if(isAdmin){
    const {data:acc}=await sb.from('card_access').select('card_id,user_id');
    (acc||[]).forEach(a=>{(accessByCard[a.card_id]=accessByCard[a.card_id]||[]).push(a.user_id);});
  }

  const rail=document.getElementById('rail');
  rail.innerHTML='';
  document.getElementById('emptyState').classList.toggle('hidden',cards.length>0);
  rail.classList.toggle('hidden',cards.length===0);

  cards.forEach(c=>{
    const el=document.createElement('div');
    el.className='card'; el.dataset.id=c.id;
    el.innerHTML=`
      ${isAdmin && !c.visible_to_all ? '<span class="lock-tag">🔒 Restricted</span>':''}
      ${c.thumbnail_url ? `<img class="thumb" src="${esc(c.thumbnail_url)}" alt="">` : `<div class="thumb empty">No image</div>`}
      <div class="scrim"></div>
      <div class="label">
        ${c.subtitle?`<div class="sub">${esc(c.subtitle)}</div>`:''}
        <h3>${esc(c.title)}</h3>
      </div>
      <div class="cta">
        <span class="lbl">Tap to open</span>
        <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="admin-tools">
        <button class="btn sm">Edit</button>
        <button class="btn sm danger">Delete</button>
      </div>`;
    const [editBtn,delBtn]=el.querySelectorAll('.admin-tools .btn');
    if(editBtn) editBtn.onclick=(e)=>{e.stopPropagation();editCard(c);};
    if(delBtn) delBtn.onclick=(e)=>{e.stopPropagation();deleteCard(c.id);};
    el.addEventListener('click',()=>{ if(!document.body.classList.contains('editing')) openDetail(c.id); });
    el._access=accessByCard[c.id]||[];
    rail.appendChild(el);
  });

  if(isAdmin) setupSort();
}

function setupSort(){
  if(sortable) sortable.destroy();
  sortable=Sortable.create(document.getElementById('rail'),{
    animation:180, disabled:!document.body.classList.contains('editing'),
    ghostClass:'dragging', onEnd:persistOrder
  });
}
async function persistOrder(){
  const ids=[...document.querySelectorAll('#rail .card')].map(el=>el.dataset.id);
  await Promise.all(ids.map((id,i)=>sb.from('cards').update({sort_order:i}).eq('id',id)));
}
function toggleEdit(){
  const editing=document.body.classList.toggle('editing');
  document.getElementById('navEdit').classList.toggle('active',editing);
  document.getElementById('navEditLabel').textContent=editing?'Done':'Edit';
  if(sortable) sortable.option('disabled',!editing);
}
function scrollRail(dir){
  const rail=document.getElementById('rail');
  rail.scrollBy({left:dir*(rail.clientWidth*0.7),behavior:'smooth'});
}

/* ---- expanded detail ---- */
function openDetail(id){
  const c=cardsById[id]; if(!c) return;
  document.getElementById('d_hero').innerHTML = c.thumbnail_url
    ? `<img src="${esc(c.thumbnail_url)}" alt="">` : `<div class="empty">No image</div>`;
  document.getElementById('d_sub').textContent=c.subtitle||'';
  document.getElementById('d_sub').style.display=c.subtitle?'block':'none';
  document.getElementById('d_title').textContent=c.title;
  document.getElementById('d_desc').textContent=c.description||'';
  document.getElementById('d_desc').style.display=c.description?'block':'none';
  const link=document.getElementById('d_link');
  link.textContent=c.button_label||'Open'; link.href=c.link_url;
  document.getElementById('detailOverlay').classList.add('show');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('show'); }

/* ---- add/edit modal ---- */
function openModal(){
  document.getElementById('modalTitle').textContent='Add card';
  ['cardId','f_title','f_subtitle','f_description','f_link','f_button'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_thumb').value='';
  document.getElementById('thumbPreview').style.display='none';
  document.getElementById('f_visall').checked=false;
  buildAccessList([]); toggleAccessList();
  document.getElementById('modalErr').textContent='';
  document.getElementById('overlay').classList.add('show');
}
function editCard(c){
  openModal();
  document.getElementById('modalTitle').textContent='Edit card';
  document.getElementById('cardId').value=c.id;
  document.getElementById('f_title').value=c.title||'';
  document.getElementById('f_subtitle').value=c.subtitle||'';
  document.getElementById('f_description').value=c.description||'';
  document.getElementById('f_link').value=c.link_url||'';
  document.getElementById('f_button').value=c.button_label||'';
  document.getElementById('f_visall').checked=!!c.visible_to_all;
  if(c.thumbnail_url){const p=document.getElementById('thumbPreview');p.src=c.thumbnail_url;p.style.display='block';}
  const el=document.querySelector(`#rail .card[data-id="${c.id}"]`);
  buildAccessList(el?el._access:[]); toggleAccessList();
}
function buildAccessList(checkedIds){
  const list=document.getElementById('accessList');
  list.innerHTML=agents.length?'':'<span style="color:var(--muted);font-size:13px">No agents yet.</span>';
  agents.forEach(a=>{
    list.insertAdjacentHTML('beforeend',
      `<label><input type="checkbox" value="${a.id}" ${checkedIds.includes(a.id)?'checked':''}> ${esc(a.full_name||'(no name)')}</label>`);
  });
}
function toggleAccessList(){
  document.getElementById('accessWrap').style.display=document.getElementById('f_visall').checked?'none':'block';
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

async function saveCard(){
  const err=document.getElementById('modalErr'); err.textContent='';
  const id=document.getElementById('cardId').value;
  const title=document.getElementById('f_title').value.trim();
  const link=document.getElementById('f_link').value.trim();
  if(!title||!link){ err.textContent='Title and link are required.'; return; }
  const saveBtn=document.getElementById('saveBtn'); saveBtn.disabled=true; saveBtn.textContent='Saving…';
  try{
    let thumbUrl;
    const file=document.getElementById('f_thumb').files[0];
    if(file){
      const path=`${crypto.randomUUID()}-${file.name.replace(/[^\w.\-]/g,'_')}`;
      const {error:upErr}=await sb.storage.from('thumbnails').upload(path,file);
      if(upErr) throw upErr;
      thumbUrl=sb.storage.from('thumbnails').getPublicUrl(path).data.publicUrl;
    }
    const payload={
      title, subtitle:document.getElementById('f_subtitle').value.trim(),
      description:document.getElementById('f_description').value.trim(),
      link_url:link, button_label:document.getElementById('f_button').value.trim()||'Open',
      visible_to_all:document.getElementById('f_visall').checked
    };
    if(thumbUrl) payload.thumbnail_url=thumbUrl;
    let cardId=id;
    if(id){
      const {error}=await sb.from('cards').update(payload).eq('id',id); if(error) throw error;
    }else{
      const {count}=await sb.from('cards').select('*',{count:'exact',head:true});
      payload.sort_order=count||0;
      const {data,error}=await sb.from('cards').insert(payload).select('id').single(); if(error) throw error;
      cardId=data.id;
    }
    await sb.from('card_access').delete().eq('card_id',cardId);
    if(!payload.visible_to_all){
      const checked=[...document.querySelectorAll('#accessList input:checked')].map(i=>i.value);
      if(checked.length) await sb.from('card_access').insert(checked.map(uid=>({card_id:cardId,user_id:uid})));
    }
    closeModal(); loadCards();
  }catch(e){ console.error(e); err.textContent=e.message||'Something went wrong.'; }
  finally{ saveBtn.disabled=false; saveBtn.textContent='Save'; }
}
async function deleteCard(id){
  if(!confirm('Delete this card?')) return;
  await sb.from('cards').delete().eq('id',id); loadCards();
}

document.getElementById('f_thumb')?.addEventListener('change',e=>{
  const f=e.target.files[0]; const p=document.getElementById('thumbPreview');
  if(f){ p.src=URL.createObjectURL(f); p.style.display='block'; }
});
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeDetail(); closeModal(); }
  if(e.key==='Enter' && !document.getElementById('login').classList.contains('hidden')) signIn();
});
init();
</script>
</body>
</html>
